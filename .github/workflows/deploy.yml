name: Build, Push Docker Image and Deploy to EC2

on:
  push:
    branches:
      - main  # o master, según tu rama principal
  workflow_dispatch:  # Permite ejecutar manualmente

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar el repositorio
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Iniciar sesión en Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DH_USER_FIN }}
        password: ${{ secrets.DH_TOKEN_FIN }}

    # 3. Obtener metadata para etiquetar la imagen
    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ secrets.DH_USER_FIN }}/mi-app

    # 4. Construir y subir imagen a Docker Hub
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DH_USER_FIN }}/mi-app:latest
        labels: ${{ steps.meta.outputs.labels }}

    # 5. Configurar SSH para conectarse a EC2
    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_KEY_FIN }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_IP_FIN }} >> ~/.ssh/known_hosts

    # 6. Desplegar en EC2
    - name: Deploy to EC2
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER_FIN }}@${{ secrets.EC2_IP_FIN }} '
          # Crear directorio si no existe
          mkdir -p ~/app

          # Crear docker-compose.yaml en EC2
          cat > ~/app/docker-compose.yaml << EOF
          services:
            db:
              image: mariadb:10.11
              container_name: mariadb_db
              restart: always
              environment:
                MARIADB_USER: user
                MARIADB_PASSWORD: pass
                MARIADB_DATABASE: dbname
                MARIADB_ROOT_PASSWORD: rootpassword
              ports:
                - "3306:3306"
              volumes:
                - mariadb_data:/var/lib/mysql

            web:
              image: ${{ secrets.DH_USER_FIN }}/mi-app:latest
              container_name: web
              restart: always
              ports:
                - "80:8000"
              environment:
                - DATABASE_URL=mysql+pymysql://user:pass@db:3306/dbname
              depends_on:
                - db

          volumes:
            mariadb_data:
          EOF

          # Ir al directorio y desplegar
          cd ~/app
          docker-compose down
          docker-compose pull
          docker-compose up -d

          # Limpiar imágenes no usadas
          docker system prune -f
        '

    # 7. Verificar que la aplicación está funcionando
    - name: Verify deployment
      run: |
        sleep 10
        # Opciones de verificación
        echo "Verificando servicio..."
    
        # Intentar con diferentes formatos
        curl -f http://localhost:80 || \
        curl -f http://127.0.0.1:80 || \
        curl -f http://$(hostname -I | awk '{print $1}'):80 || \
        (echo "❌ No se pudo conectar" && exit 1)
    
        echo "✅ Servicio verificado!"
